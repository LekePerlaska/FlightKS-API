services:
  api:
    build: .
    ports:
      - "5194:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=flightks;Username=flightks;Password=flightks
      - Loki__Uri=http://loki:3100
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - flightks-net

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flightks
      POSTGRES_USER: flightks
      POSTGRES_PASSWORD: flightks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightks"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flightks-net

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - flightks-net

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - flightks-net

networks:
  flightks-net:
    driver: bridge

volumes:
  postgres_data:
  loki_data:
  grafana_data:
